<svg width="80" height="120" viewBox="0 0 80 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Corpo principal do carro -->
  <rect x="15" y="20" width="50" height="80" rx="8" fill="#e74c3c" />

  <!-- Capô -->
  <path d="M 20 20 L 40 5 L 60 20 Z" fill="#c0392b" />

  <!-- Para-brisa dianteiro -->
  <rect x="25" y="22" width="30" height="15" rx="3" fill="#4a90e2" opacity="0.6" />

  <!-- Janelas laterais -->
  <rect x="20" y="45" width="8" height="25" rx="2" fill="#4a90e2" opacity="0.6" />
  <rect x="52" y="45" width="8" height="25" rx="2" fill="#4a90e2" opacity="0.6" />

  <!-- Para-brisa traseiro -->
  <rect x="25" y="75" width="30" height="12" rx="3" fill="#4a90e2" opacity="0.6" />

  <!-- Porta-malas -->
  <rect x="20" y="90" width="40" height="8" rx="2" fill="#c0392b" />

  <!-- Rodas -->
  <!-- Roda dianteira esquerda -->
  <rect x="8" y="25" width="10" height="18" rx="2" fill="#2c3e50" />
  <rect x="10" y="27" width="6" height="14" rx="1" fill="#34495e" />

  <!-- Roda dianteira direita -->
  <rect x="62" y="25" width="10" height="18" rx="2" fill="#2c3e50" />
  <rect x="64" y="27" width="6" height="14" rx="1" fill="#34495e" />

  <!-- Roda traseira esquerda -->
  <rect x="8" y="77" width="10" height="18" rx="2" fill="#2c3e50" />
  <rect x="10" y="79" width="6" height="14" rx="1" fill="#34495e" />

  <!-- Roda traseira direita -->
  <rect x="62" y="77" width="10" height="18" rx="2" fill="#2c3e50" />
  <rect x="64" y="79" width="6" height="14" rx="1" fill="#34495e" />

  <!-- Faróis -->
  <circle cx="30" cy="8" r="3" fill="#ffd700" opacity="0.9" />
  <circle cx="50" cy="8" r="3" fill="#ffd700" opacity="0.9" />

  <!-- Luzes traseiras -->
  <rect x="22" y="98" width="6" height="3" rx="1" fill="#ff0000" opacity="0.8" />
  <rect x="52" y="98" width="6" height="3" rx="1" fill="#ff0000" opacity="0.8" />

  <!-- Detalhes da carroceria -->
  <line x1="40" y1="40" x2="40" y2="70" stroke="#c0392b" stroke-width="1.5" />
  <rect x="35" y="55" width="10" height="5" rx="1" fill="#34495e" />
</svg>
