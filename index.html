<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Caos na Estrada - Phaser 3</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #1a1a1a; /* Cor de asfalto escuro */
        color: #f2e6d8;
        font-family: "Trebuchet MS", Verdana, sans-serif;
      }
      #game-container {
        width: 100vw;
        height: 100vh;
        display: grid;
        place-items: center;
      }
      canvas {
        border: 4px solid #ffcc00; /* Rebordo amarelo trânsito */
        box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
        max-width: 100%;
        max-height: 100%;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <div id="game-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
